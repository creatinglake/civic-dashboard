<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130" fill="#386759">
  <!-- Spire -->
  <path d="M50,0 L48,5 L50,4 L52,5 Z"/>
  <rect x="49" y="5" width="2" height="7" rx="0.5"/>

  <!-- Dome -->
  <path d="M30,46 C30,28 38,16 50,12 C62,16 70,28 70,46 Z"/>
  <!-- Dome ribs (subtle lines as thin negative-space cuts) -->
  <rect x="49.2" y="12" width="1.6" height="34" fill="white" opacity="0.15"/>
  <path d="M40,44 C40,30 44,20 50,16" stroke="white" stroke-width="0.8" fill="none" opacity="0.15"/>
  <path d="M60,44 C60,30 56,20 50,16" stroke="white" stroke-width="0.8" fill="none" opacity="0.15"/>
  <!-- Dome horizontal bands -->
  <rect x="32" y="30" width="36" height="1.5" rx="0.5" fill="white" opacity="0.2"/>
  <rect x="35" y="22" width="30" height="1.2" rx="0.5" fill="white" opacity="0.15"/>

  <!-- Entablature below dome -->
  <rect x="26" y="46" width="48" height="4" rx="0.5"/>

  <!-- Upper colonnade / drum -->
  <rect x="31" y="50" width="2.5" height="13"/>
  <rect x="36.5" y="50" width="2.5" height="13"/>
  <rect x="42" y="50" width="2.5" height="13"/>
  <rect x="47.5" y="50" width="2.5" height="13"/>
  <rect x="53" y="50" width="2.5" height="13"/>
  <rect x="58.5" y="50" width="2.5" height="13"/>
  <rect x="64" y="50" width="2.5" height="13"/>

  <!-- Lower entablature (wider) -->
  <rect x="18" y="63" width="64" height="4" rx="0.5"/>

  <!-- Lower building body with arch -->
  <rect x="18" y="67" width="12" height="16"/>
  <rect x="70" y="67" width="12" height="16"/>
  <!-- Arch in center -->
  <path d="M30,83 L30,73 C30,67 50,67 50,67 C50,67 70,67 70,73 L70,83 Z"/>
  <!-- Arch columns -->
  <rect x="33" y="67" width="2.5" height="16" fill="white" opacity="0.2"/>
  <rect x="40" y="67" width="2.5" height="16" fill="white" opacity="0.2"/>
  <rect x="55" y="67" width="2.5" height="16" fill="white" opacity="0.2"/>
  <rect x="62" y="67" width="2.5" height="16" fill="white" opacity="0.2"/>
  <!-- Arch opening -->
  <path d="M42,83 L42,76 C42,72 50,70 50,70 C50,70 58,72 58,76 L58,83 Z" fill="white" opacity="0.25"/>

  <!-- Base / steps -->
  <rect x="14" y="83" width="72" height="3" rx="0.5"/>

  <!-- People silhouettes -->
  <!-- Left person -->
  <circle cx="26" cy="96" r="8"/>
  <path d="M14,130 C14,112 18,108 26,108 C34,108 38,112 38,130 Z"/>

  <!-- Center person (slightly larger) -->
  <circle cx="50" cy="94.5" r="9"/>
  <path d="M37,130 C37,110 41,106 50,106 C59,106 63,110 63,130 Z"/>

  <!-- Right person -->
  <circle cx="74" cy="96" r="8"/>
  <path d="M62,130 C62,112 66,108 74,108 C82,108 86,112 86,130 Z"/>
</svg>
